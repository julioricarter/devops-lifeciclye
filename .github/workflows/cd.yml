name: CD — Continuous Delivery

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options: [staging, production]
      image_tag:
        description: 'Docker image tag to deploy (default: latest main)'
        required: false

env:
  IMAGE_NAME: devops-demo-api

jobs:
  # ────────────────────────────────────────────────────────────────
  # JOB 1: Deploy to Staging
  # ────────────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://api.staging.example.com
    steps:
      - uses: actions/checkout@v4

      # Este repo es una demo: no siempre hay un clúster real detrás del
      # secret KUBECONFIG_STAGING. En vez de fallar con un error críptico
      # de kubectl, detectamos la ausencia del secret y reportamos un
      # skip explícito — el job termina en éxito, no en rojo.
      - name: Check staging cluster credentials
        id: check
        run: |
          if [ -n "${{ secrets.KUBECONFIG_STAGING }}" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip — no hay clúster de staging configurado
        if: steps.check.outputs.configured != 'true'
        run: |
          echo "::notice title=Deploy a staging omitido::No existe el secret KUBECONFIG_STAGING en este repositorio, así que no hay un clúster real al que desplegar."
          echo "::notice title=Cómo habilitarlo::Crea el secret en Settings → Secrets and variables → Actions → KUBECONFIG_STAGING (kubeconfig en base64) para que este job despliegue de verdad."

      - name: Set image tag
        if: steps.check.outputs.configured == 'true'
        id: tag
        run: |
          TAG="${{ github.event.inputs.image_tag || format('sha-{0}', github.sha) }}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Set up kubectl
        if: steps.check.outputs.configured == 'true'
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.29.0'

      - name: Configure kubeconfig (staging)
        if: steps.check.outputs.configured == 'true'
        run: |
          echo "${{ secrets.KUBECONFIG_STAGING }}" | base64 -d > kubeconfig
          export KUBECONFIG=kubeconfig

      - name: Update image in staging overlay
        if: steps.check.outputs.configured == 'true'
        run: |
          cd kubernetes/overlays/staging
          sed -i "s|image: .*devops-demo-api.*|image: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}|" kustomization.yaml

      - name: Apply Kubernetes manifests (staging)
        if: steps.check.outputs.configured == 'true'
        run: |
          export KUBECONFIG=kubeconfig
          kubectl apply -k kubernetes/overlays/staging --namespace=staging

      - name: Wait for rollout
        if: steps.check.outputs.configured == 'true'
        run: |
          export KUBECONFIG=kubeconfig
          kubectl rollout status deployment/devops-demo-api -n staging --timeout=120s

      - name: Smoke test staging
        if: steps.check.outputs.configured == 'true'
        run: |
          sleep 10
          curl -f https://api.staging.example.com/health || exit 1

  # ────────────────────────────────────────────────────────────────
  # JOB 2: Deploy to Production (manual gate)
  # ────────────────────────────────────────────────────────────────
  deploy-production:
    name: Deploy → Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment:
      name: production
      url: https://api.example.com
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Check production cluster credentials
        id: check
        run: |
          if [ -n "${{ secrets.KUBECONFIG_PRODUCTION }}" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip — no hay clúster de producción configurado
        if: steps.check.outputs.configured != 'true'
        run: |
          echo "::notice title=Deploy a producción omitido::No existe el secret KUBECONFIG_PRODUCTION en este repositorio, así que no hay un clúster real al que desplegar."
          echo "::notice title=Cómo habilitarlo::Crea el secret en Settings → Secrets and variables → Actions → KUBECONFIG_PRODUCTION (kubeconfig en base64) para que este job despliegue de verdad."

      - name: Set image tag
        if: steps.check.outputs.configured == 'true'
        id: tag
        run: |
          TAG="${{ github.event.inputs.image_tag || format('sha-{0}', github.sha) }}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Set up kubectl
        if: steps.check.outputs.configured == 'true'
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.29.0'

      - name: Configure kubeconfig (production)
        if: steps.check.outputs.configured == 'true'
        run: |
          echo "${{ secrets.KUBECONFIG_PRODUCTION }}" | base64 -d > kubeconfig
          export KUBECONFIG=kubeconfig

      - name: Update image in production overlay
        if: steps.check.outputs.configured == 'true'
        run: |
          cd kubernetes/overlays/production
          sed -i "s|image: .*devops-demo-api.*|image: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}|" kustomization.yaml

      - name: Apply Kubernetes manifests (production)
        if: steps.check.outputs.configured == 'true'
        run: |
          export KUBECONFIG=kubeconfig
          kubectl apply -k kubernetes/overlays/production --namespace=production

      - name: Wait for rollout
        if: steps.check.outputs.configured == 'true'
        run: |
          export KUBECONFIG=kubeconfig
          kubectl rollout status deployment/devops-demo-api -n production --timeout=180s

      - name: Smoke test production
        if: steps.check.outputs.configured == 'true'
        run: |
          sleep 15
          curl -f https://api.example.com/health || exit 1

      - name: Notify Slack on success
        if: steps.check.outputs.configured == 'true' && success()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": ":rocket: *Production deploy successful*\nVersion: `${{ steps.tag.outputs.tag }}`\nCommit: `${{ github.sha }}`\nBy: ${{ github.actor }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify Slack on failure
        if: steps.check.outputs.configured == 'true' && failure()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": ":red_circle: *Production deploy FAILED*\nVersion: `${{ steps.tag.outputs.tag }}`\nCommit: `${{ github.sha }}`\nBy: ${{ github.actor }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
