groups:
  - name: api_availability
    interval: 30s
    rules:
      - alert: APIDown
        expr: up{job="devops-demo-api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "API instance down"
          description: "{{ $labels.instance }} has been down for more than 1 minute."

      - alert: APIHighErrorRate
        expr: |
          rate(http_requests_total{job="devops-demo-api",status_code=~"5.."}[5m])
          /
          rate(http_requests_total{job="devops-demo-api"}[5m]) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High error rate on API"
          description: "Error rate is {{ printf \"%.1f\" $value | humanizePercentage }} (threshold: 5%)"

      - alert: APIHighLatency
        expr: |
          histogram_quantile(0.95,
            rate(http_request_duration_seconds_bucket{job="devops-demo-api"}[5m])
          ) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "API p95 latency above 500ms"
          description: "p95 latency is {{ $value | humanizeDuration }}"

  - name: infrastructure
    rules:
      - alert: HighCPUUsage
        expr: 100 - (avg by(instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage on {{ $labels.instance }}"
          description: "CPU usage is {{ printf \"%.0f\" $value }}%"

      - alert: HighMemoryUsage
        expr: |
          (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes)
          / node_memory_MemTotal_bytes * 100 > 90
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High memory usage on {{ $labels.instance }}"
          description: "Memory usage is {{ printf \"%.0f\" $value }}%"

      - alert: DiskSpaceLow
        expr: node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"} * 100 < 15
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Low disk space on {{ $labels.instance }}"
          description: "Available disk space is {{ printf \"%.0f\" $value }}%"
