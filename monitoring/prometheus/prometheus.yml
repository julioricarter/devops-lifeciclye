global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    cluster: devops-demo
    environment: local

rule_files:
  - "rules/*.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  # Prometheus itself
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # API application
  - job_name: devops-demo-api
    scrape_interval: 10s
    static_configs:
      - targets: ['api:3000']
    metrics_path: /metrics

  # Node exporter (host metrics)
  - job_name: node-exporter
    static_configs:
      - targets: ['node-exporter:9100']

  # Docker daemon metrics (optional)
  - job_name: docker
    static_configs:
      - targets: ['host.docker.internal:9323']
    honor_labels: true
